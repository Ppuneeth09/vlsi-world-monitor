name: Daily VLSI Industry Monitor
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: pip install feedparser beautifulsoup4 requests lxml
    - name: Run Monitor Scraper
      run: python advanced_monitor.py
    - name: Commit and Push Data Changes
      run: |
        git config --global user.name "VLSI Monitor Bot"
        git config --global user.email "bot@vlsidashboard.org"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Daily Update: $(date +'%Y-%m-%d')" && git push)
