<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLSI World Monitor</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <header class="border-b border-slate-800 bg-slate-950 p-6 text-center">
        <h1 class="text-3xl font-extrabold text-cyan-400">💾 VLSI World Monitor</h1>
        <p class="text-slate-400 mt-2 text-sm">An open-source daily tracker for the global semiconductor industry</p>
    </header>
    <main class="max-w-4xl mx-auto p-6">
        <div id="loading" class="text-center text-xl my-12 text-slate-500">Scanning the silicon ecosystem...</div>
        <div id="news-container" class="space-y-4 hidden"></div>
    </main>
    <script>
        async function loadMonitorData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const container = document.getElementById('news-container');
                const loader = document.getElementById('loading');
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-950 p-5 rounded-xl border border-slate-850 hover:border-cyan-500/50 transition-all duration-200 shadow-xl";
                    card.innerHTML = `
                        <div class="flex items-center space-x-3 mb-2">
                            <span class="text-xs font-bold uppercase px-2 py-0.5 rounded bg-cyan-950 text-cyan-400 border border-cyan-800">${item.source}</span>
                            <span class="text-xs text-slate-500">${item.date}</span>
                        </div>
                        <a href="${item.link}" target="_blank" class="text-lg font-semibold hover:text-cyan-300 block text-slate-100">${item.title}</a>`;
                    container.appendChild(card);
                });
                loader.classList.add('hidden'); container.classList.remove('hidden');
            } catch (error) { document.getElementById('loading').innerText = "Running first build... No updates captured yet."; }
        }
        loadMonitorData();
    </script>
</body>
</html>
